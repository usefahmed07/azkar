
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0d1f1a;--ink2:#2a4a3e;--ink3:#4a7c6a;
  --parchment:#faf6ee;--parchment2:#f3edd8;--parchment3:#e8dfca;
  --gold:#b8860b;--gold2:#d4a94a;--gold3:#f0d080;
  --emerald:#0f5a3c;--emerald2:#1a7a52;--emerald3:#2aaa70;
  --ruby:#8b1a1a;
}
body{background:transparent;font-family:'Amiri',serif;direction:rtl;}

.app{max-width:680px;margin:0 auto;}

.hero{
  background:var(--emerald);
  padding:0;border-radius:16px;overflow:hidden;
  margin-bottom:12px;position:relative;
}
.hero-pattern{
  position:absolute;inset:0;opacity:0.07;
  background-image:
    repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%),
    repeating-linear-gradient(-45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);
  background-size:20px 20px;
}
.hero-inner{position:relative;padding:28px 24px 20px;text-align:center;}
.hero-ornament{
  display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;
}
.ornament-line{flex:1;height:1px;background:var(--gold2);opacity:0.5;}
.ornament-diamond{
  width:8px;height:8px;background:var(--gold2);transform:rotate(45deg);
}
.hero-title{
  font-family:'Amiri',serif;font-size:1.8rem;font-weight:700;
  color:#f5e6c0;letter-spacing:0.05em;margin-bottom:4px;
}
.hero-sub{font-family:'Amiri',serif;font-size:0.95rem;color:#9dd4b5;margin-bottom:18px;}
.hero-stats{
  display:flex;justify-content:center;gap:8px;flex-wrap:wrap;
}
.stat-pill{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);
  color:#d4f0e4;font-size:0.82rem;padding:4px 14px;border-radius:20px;
  font-family:'Amiri',serif;
}
.stat-pill b{color:#f0d080;font-weight:700;}

.nav{display:flex;gap:6px;margin-bottom:12px;padding:0 2px;}
.nav-btn{
  flex:1;padding:10px 6px;border:1px solid var(--color-border-tertiary);
  background:var(--color-background-primary);color:var(--color-text-secondary);
  border-radius:10px;cursor:pointer;font-family:'Amiri',serif;font-size:1rem;
  transition:all 0.18s;text-align:center;
}
.nav-btn.on{
  background:var(--emerald);color:#f5e6c0;border-color:var(--emerald);font-weight:700;
}
.nav-icon{font-size:1.1rem;display:block;margin-bottom:2px;}

.prog-wrap{
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:12px;padding:14px 16px;margin-bottom:12px;
}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.prog-label{font-family:'Amiri',serif;font-size:0.95rem;color:var(--color-text-secondary);}
.prog-count{font-family:'Amiri',serif;font-size:0.95rem;color:var(--emerald);font-weight:700;}
.prog-track{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--emerald);border-radius:3px;transition:width 0.35s;}

.cards-list{display:flex;flex-direction:column;gap:10px;}

.zcard{
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:14px;overflow:hidden;
  transition:border-color 0.2s;
}
.zcard.done{opacity:0.55;border-color:var(--color-border-tertiary);}
.zcard-top{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border-bottom:0.5px solid var(--color-border-tertiary);
  background:var(--color-background-secondary);
}
.zcard-num{
  width:28px;height:28px;border-radius:50%;
  background:var(--emerald);color:#f5e6c0;
  display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;font-weight:700;font-family:'Amiri',serif;flex-shrink:0;
}
.zcard.done .zcard-num{background:#888;}
.zcard-name{flex:1;font-family:'Amiri',serif;font-size:0.95rem;color:var(--color-text-secondary);}
.rep-tag{
  background:var(--parchment2);color:var(--gold);
  border:1px solid var(--parchment3);
  padding:2px 10px;border-radius:20px;font-size:0.78rem;
  font-family:'Amiri',serif;white-space:nowrap;
}
.done-tag{
  background:#e8f5e9;color:#2d7a4f;
  border:1px solid #a5d6a7;
  padding:2px 10px;border-radius:20px;font-size:0.78rem;
  font-family:'Amiri',serif;display:none;
}
.zcard.done .done-tag{display:inline;}
.zcard.done .rep-tag{display:none;}

.zcard-body{padding:14px 16px;}
.qtext{
  font-family:'Amiri Quran','Amiri',serif;font-size:1.22rem;
  line-height:2.1;color:var(--color-text-primary);text-align:center;
  margin-bottom:10px;
}
.zmeaning{
  font-family:'Amiri',serif;font-size:0.88rem;color:var(--color-text-secondary);
  text-align:center;line-height:1.7;padding:8px 12px;
  background:var(--color-background-secondary);
  border-radius:8px;margin-bottom:12px;
  border-right:3px solid var(--emerald);border-radius:0 8px 8px 0;
}
.ctr-row{display:flex;align-items:center;justify-content:center;gap:12px;}
.cbtn{
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  font-size:1.3rem;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.cbtn.plus{background:var(--emerald);color:#f5e6c0;}
.cbtn.plus:hover{background:var(--emerald2);}
.cbtn.plus:active{transform:scale(0.93);}
.cbtn.minus{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);}
.cbtn.minus:hover{background:var(--color-background-tertiary);}
.ctr-display{
  font-family:'Amiri',serif;text-align:center;min-width:90px;
}
.ctr-num{font-size:1.6rem;font-weight:700;color:var(--emerald);line-height:1;}
.ctr-of{font-size:0.82rem;color:var(--color-text-tertiary);margin-top:2px;}

.tap-big{
  width:100%;padding:16px;
  background:var(--emerald);color:#f5e6c0;
  border:none;border-radius:14px;cursor:pointer;
  font-family:'Amiri',serif;font-size:1.1rem;font-weight:700;
  transition:all 0.15s;margin-bottom:10px;
}
.tap-big:hover{background:var(--emerald2);}
.tap-big:active{transform:scale(0.98);}

.salah-verse{
  background:var(--emerald);color:#f5e6c0;
  border-radius:14px;padding:18px 20px;margin-bottom:10px;text-align:center;
}
.salah-verse .qtext{color:#f5e6c0;}
.salah-verse .ref{color:#9dd4b5;font-size:0.85rem;margin-top:6px;}

.salah-card{
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:14px;margin-bottom:10px;overflow:hidden;
}
.salah-card-h{
  background:var(--color-background-secondary);
  padding:10px 16px;border-bottom:0.5px solid var(--color-border-tertiary);
}
.salah-card-ht{font-family:'Amiri',serif;font-size:0.95rem;color:var(--color-text-secondary);}
.salah-card-body{padding:14px 16px;text-align:center;}
.salah-info{
  font-family:'Amiri',serif;font-size:0.85rem;color:var(--color-text-tertiary);
  margin-top:8px;padding-top:8px;border-top:0.5px dashed var(--color-border-tertiary);
}

.salah-counter{
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:14px;padding:20px;text-align:center;margin-bottom:10px;
}
.salah-ctr-num{font-size:3rem;font-weight:700;color:var(--emerald);font-family:'Amiri',serif;line-height:1;}
.salah-ctr-lbl{font-size:0.9rem;color:var(--color-text-secondary);margin-top:4px;margin-bottom:16px;font-family:'Amiri',serif;}

.reset-link{
  display:block;text-align:center;padding:10px;
  color:var(--color-text-tertiary);font-size:0.88rem;
  font-family:'Amiri',serif;cursor:pointer;
  border:0.5px dashed var(--color-border-tertiary);border-radius:10px;
  margin-bottom:2px;background:transparent;width:100%;
}
.reset-link:hover{color:var(--color-text-secondary);background:var(--color-background-secondary);}
</style>

  {n:"الصلاة الإبراهيمية",t:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ إِنَّكَ حَمِيدٌ مَجِيدٌ اللَّهُمَّ بَارِكْ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ إِنَّكَ حَمِيدٌ مَجِيدٌ",i:"الصيغة الكاملة المأثورة — تُقرأ في التشهد الأخير"},
  {n:"الصلاة المختصرة",t:"اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ",i:"أجمل وأيسر صيغ الصلاة على النبي ﷺ"},
  {n:"صلاة التنجية",t:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّمْ",i:"صيغة جامعة للنبي وآله وصحبه الكرام"},
];

let C={};
let cur='sabah';

function repLabel(r){
  if(r===1)return'مرة';
  if(r===3)return'٣ مرات';
  if(r===7)return'٧ مرات';
  if(r===33)return'٣٣ مرة';
  if(r===100)return'١٠٠ مرة';
  return r+' مرات';
}

function buildAzkar(sec){
  const data=D[sec];
  const total=data.length;
  const done=data.filter((_,i)=>(C[sec+'_'+i]||0)>=data[i].r).length;
  const pct=total?Math.round(done/total*100):0;
  let h=`
    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-label">تقدمك في أذكار ${sec==='sabah'?'الصباح':'المساء'}</span>
        <span class="prog-count">${done} / ${total}</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="cards-list">
  `;
  data.forEach((z,i)=>{
    const k=sec+'_'+i;
    const cnt=C[k]||0;
    const isDone=cnt>=z.r;
    h+=`<div class="zcard${isDone?' done':''}" id="zc_${k}">
      <div class="zcard-top">
        <div class="zcard-num">${isDone?'✓':i+1}</div>
        <span class="zcard-name">${z.n}</span>
        <span class="rep-tag">${repLabel(z.r)}</span>
        <span class="done-tag">تم ✓</span>
      </div>
      <div class="zcard-body">
        <p class="qtext">${z.t}</p>
        <p class="zmeaning">${z.m}</p>
        <div class="ctr-row">
          <button class="cbtn minus" onclick="dec('${sec}',${i})">−</button>
          <div class="ctr-display">
            <div class="ctr-num" id="cn_${k}">${cnt}</div>
            <div class="ctr-of">من ${z.r}</div>
          </div>
          <button class="cbtn plus" onclick="inc('${sec}',${i})" ${isDone?'disabled':''}>+</button>
        </div>
      </div>
    </div>`;
  });
  h+=`</div>
    <br>
    <button class="reset-link" onclick="reset('${sec}')">↺ إعادة ضبط أذكار ${sec==='sabah'?'الصباح':'المساء'}</button>`;
  return h;
}

function buildSalah(){
  const cnt=C['salah']||0;
  let h=`
    <div class="salah-verse">
      <p class="qtext">﴿ إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ ۚ يَا أَيُّهَا الَّذِينَ آمَنُوا صَلُّوا عَلَيْهِ وَسَلِّمُوا تَسْلِيمًا ﴾</p>
      <p class="ref">سورة الأحزاب — آية ٥٦</p>
    </div>
  `;
  salawat.forEach(s=>{
    h+=`<div class="salah-card">
      <div class="salah-card-h"><span class="salah-card-ht">${s.n}</span></div>
      <div class="salah-card-body">
        <p class="qtext">${s.t}</p>
        <p class="salah-info">${s.i}</p>
      </div>
    </div>`;
  });
  h+=`<div class="salah-counter">
    <div class="ctr-num salah-ctr-num" id="salah-c">${cnt}</div>
    <div class="salah-ctr-lbl">عدد مرات الصلاة على النبي ﷺ</div>
    <button class="tap-big" onclick="incSalah()">صلِّ على النبي ﷺ</button>
    <div class="ctr-row" style="justify-content:center;gap:8px;">
      <button class="cbtn minus" onclick="decSalah()">−</button>
      <button class="reset-link" style="width:auto;padding:8px 20px;" onclick="resetSalah()">↺ إعادة</button>
    </div>
  </div>`;
  return h;
}

function updateHeroStats(){
  const sD=D.sabah.filter((_,i)=>(C['sabah_'+i]||0)>=D.sabah[i].r).length;
  const mD=D.masa.filter((_,i)=>(C['masa_'+i]||0)>=D.masa[i].r).length;
  const sc=C['salah']||0;
  document.getElementById('hero-stats').innerHTML=`
    <span class="stat-pill">صباح <b>${sD}/${D.sabah.length}</b></span>
    <span class="stat-pill">مساء <b>${mD}/${D.masa.length}</b></span>
    <span class="stat-pill">صلاة على النبي <b>${sc}</b></span>
  `;
}

function render(sec){
  if(sec==='salah'){
    document.getElementById('view-salah').innerHTML=buildSalah();
  } else {
    document.getElementById('view-'+sec).innerHTML=buildAzkar(sec);
  }
  updateHeroStats();
}

function go(sec,btn){
  cur=sec;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['sabah','masa','salah'].forEach(s=>{
    document.getElementById('view-'+s).style.display=s===sec?'block':'none';
  });
  render(sec);
}

function inc(sec,i){
  const k=sec+'_'+i;
  if((C[k]||0)<D[sec][i].r){ C[k]=(C[k]||0)+1; render(sec); }
}
function dec(sec,i){
  const k=sec+'_'+i;
  if((C[k]||0)>0){ C[k]--; render(sec); }
}
function reset(sec){
  D[sec].forEach((_,i)=>{C[sec+'_'+i]=0;});
  render(sec);
}
function incSalah(){ C['salah']=(C['salah']||0)+1; document.getElementById('salah-c').textContent=C['salah']; updateHeroStats(); }
function decSalah(){ if((C['salah']||0)>0){C['salah']--;document.getElementById('salah-c').textContent=C['salah'];updateHeroStats();} }
function resetSalah(){ C['salah']=0; document.getElementById('salah-c').textContent=0; updateHeroStats(); }

render('sabah');
updateHeroStats();
</script>
