  {title:"صلاة التنجية",text:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّمْ",info:"صيغة مختصرة جامعة للصلاة على النبي وآله وصحبه"},
];

let counters = {};

function initCounters(section, data){
  data.forEach((z,i)=>{
    const key = section+'_'+i;
    if(counters[key]===undefined) counters[key]=0;
  });
}

function renderSection(id, data){
  const el = document.getElementById(id);
  initCounters(id, data);
  const total = data.length;
  const done = data.filter((_,i)=> counters[id+'_'+i] >= data[i].repeat).length;
  const pct = Math.round(done/total*100);

  let html = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <p class="progress-text">أتممت ${done} من ${total} أذكار (${pct}٪)</p>
  `;

  data.forEach((z,i)=>{
    const key = id+'_'+i;
    const cnt = counters[key]||0;
    const isDone = cnt >= z.repeat;
    html += `
      <div class="zikr-card" id="card_${key}" style="${isDone?'opacity:0.65':''}">
        <div class="zikr-header">
          <div class="zikr-num">${i+1}</div>
          <span class="zikr-title">${z.title}</span>
          <span class="repeat-badge">${z.repeat === 1 ? 'مرة' : z.repeat === 3 ? '٣ مرات' : z.repeat === 7 ? '٧ مرات' : z.repeat === 33 ? '٣٣ مرة' : '١٠٠ مرة'}</span>
        </div>
        <div class="zikr-body">
          <p class="zikr-text">${z.text}</p>
          <p class="zikr-meaning">✦ ${z.meaning}</p>
          <div class="counter-row">
            <button class="count-btn" onclick="increment('${id}',${i})" ${isDone?'disabled':''}>＋</button>
            <div class="count-display">
              <span class="count-num">${cnt}</span> / ${z.repeat}
            </div>
            <button class="count-btn" onclick="decrement('${id}',${i})" style="background:#888;font-size:1rem;">−</button>
            <span class="done-badge ${isDone?'show':''}">✓ تم</span>
          </div>
        </div>
      </div>
    `;
  });

  html += `<button class="reset-btn" onclick="resetSection('${id}')">↺ إعادة العداد</button>`;
  el.innerHTML = html;
}

function renderSalah(){
  const el = document.getElementById('salah');
  let html = `
    <div class="zikr-card" style="background:linear-gradient(135deg,#fffbf0,#fef3cd);border-color:#d4a017;">
      <div class="zikr-body" style="text-align:center;">
        <p style="font-family:'Amiri',serif;font-size:1.1rem;color:#7a5c00;line-height:1.9;">
          ﴿ إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ ۚ يَا أَيُّهَا الَّذِينَ آمَنُوا صَلُّوا عَلَيْهِ وَسَلِّمُوا تَسْلِيمًا ﴾
        </p>
        <p style="font-family:'Amiri',serif;font-size:0.85rem;color:#9a7a20;">سورة الأحزاب - الآية ٥٦</p>
      </div>
    </div>
  `;

  salawat.forEach(s=>{
    html += `
      <div class="salah-card">
        <p class="salah-title">— ${s.title} —</p>
        <p class="salah-text">${s.text}</p>
        <hr class="salah-divider"/>
        <p style="font-family:'Amiri',serif;font-size:0.9rem;color:#a8d5b5;">${s.info}</p>
      </div>
    `;
  });

  let cnt = counters['salah_global']||0;
  html += `
    <div class="zikr-card">
      <div class="zikr-header">
        <div class="zikr-num">💚</div>
        <span class="zikr-title">عداد الصلاة على النبي ﷺ</span>
        <span class="repeat-badge">١٠ × ١٠</span>
      </div>
      <div class="zikr-body" style="text-align:center;">
        <p class="zikr-text">اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ</p>
        <div class="counter-row">
          <button class="count-btn" style="width:50px;height:50px;font-size:1.5rem;" onclick="incSalah()">＋</button>
          <div class="count-display" style="min-width:100px;">
            <span class="count-num" id="salah-cnt">${cnt}</span>
            <div style="font-size:0.8rem;color:#5a5a5a;">صلاة</div>
          </div>
          <button class="count-btn" style="background:#888;" onclick="decSalah()">−</button>
        </div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetSalah()">↺ إعادة عداد الصلاة</button>
  `;
  el.innerHTML = html;
}

function increment(sec, i){
  const key = sec+'_'+i;
  const data = azkarData[sec];
  if((counters[key]||0) < data[i].repeat){
    counters[key] = (counters[key]||0)+1;
    renderSection(sec, data);
  }
}
function decrement(sec, i){
  const key = sec+'_'+i;
  if((counters[key]||0)>0){
    counters[key]--;
    renderSection(sec, azkarData[sec]);
  }
}
function resetSection(sec){
  azkarData[sec].forEach((_,i)=>{ counters[sec+'_'+i]=0; });
  renderSection(sec, azkarData[sec]);
}
function incSalah(){
  counters['salah_global']=(counters['salah_global']||0)+1;
  document.getElementById('salah-cnt').textContent = counters['salah_global'];
}
function decSalah(){
  if((counters['salah_global']||0)>0){
    counters['salah_global']--;
    document.getElementById('salah-cnt').textContent = counters['salah_global'];
  }
}
function resetSalah(){
  counters['salah_global']=0;
  document.getElementById('salah-cnt').textContent = 0;
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab).classList.add('active');
}

renderSection('sabah', azkarData.sabah);
renderSection('masa', azkarData.masa);
renderSalah();
</script>
